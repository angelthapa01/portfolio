<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Angel Thapa</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Angel</div>
</nav>

<!-- CLOCK -->
<div class="clocks">
  <div>
    <p class="label">Local</p>
    <p id="localTime"></p>
  </div>
  <div class="divider"></div>
  <div>
    <p class="label">Nepal</p>
    <p id="nepalTime"></p>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="blur-bg"></div>

  <div class="hero-content">
    <h1>Angel Thapa</h1>
    <p class="subtitle">
      IT Student • Event & Project Management
    </p>

    <div class="actions">
      <a href="#contact" class="btn">Contact</a>

      <a href="https://www.linkedin.com/in/angel-thapa/" target="_blank" class="btn">
        LinkedIn
      </a>

      <a href="angelcv.pdf" download class="btn">CV</a>
    </div>
  </div>
</section>

<!-- RESUME -->
<section class="resume">
  <h2>Resume</h2>
  <iframe src="angelcv.pdf" class="resume-frame"></iframe>
</section>

<!-- GALLERY -->
<section class="gallery">
  <h2>Gallery</h2>

  <div class="gallery-scroll">
    <img src="img1.jpg" alt="Interaction Program" data-desc="Hosting an Interaction Program at the Ambassador's Club">
    <img src="img2.jpg" alt="MUN Conference" data-desc="Shared Leadership: Shared Future at IRGDD">
    <img src="img3.jpg" alt="Growth Event" data-desc="Attending Nepal's biggest growth event">
    <img src="img4.jpg" alt="Work event with Work Collegues" data-desc="Participating in a work event with colleagues">
    <img src="img5.jpg" alt="Growth Event" data-desc="Meeting with the Past, Present and Future President of NAS-IT Nepal">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact</h2>

  <form id="contactForm">
    <input type="text" id="cName" placeholder="Name" required />
    <input type="email" id="cEmail" placeholder="Email" required />
    <textarea id="cMsg" placeholder="Message" required></textarea>
    <button type="submit" class="btn">Send</button>
    <p id="formMsg"></p>
  </form>
</section>

<script src="script.js"></script>

</body>
</html>
